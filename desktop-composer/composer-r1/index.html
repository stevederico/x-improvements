              <svg viewBox="0 0 33 32" aria-hidden="true" class="h-5 w-5 fill-current"><path d="M12.745 20.54l10.97-8.19c.539-.4 1.307-.244 1.564.38 1.349 3.288.746 7.241-1.938 9.955-2.683 2.714-6.417 3.31-9.83 1.954l-3.728 1.745c5.347 3.697 11.84 2.782 15.898-1.324 3.219-3.255 4.216-7.692 3.284-11.693l.008.009c-1.351-5.878.332-8.227 3.782-13.031L33 0l-4.54 4.59v-.014L12.743 20.544m-2.263 1.987c-3.837-3.707-3.175-9.446.1-12.755 2.42-2.449 6.388-3.448 9.852-1.979l3.72-1.737c-.67-.49-1.53-1.017-2.515-1.387-4.455-1.854-9.789-.931-13.41 2.728-3.483 3.523-4.579 8.94-2.697 13.561 1.405 3.454-.899 5.898-3.22 8.364C1.49 30.2.666 31.074 0 32l10.478-9.466"/></svg>

              <svg viewBox="0 0 24 24" aria-hidden="true" class="h-5 w-5 fill-current"><path d="M3 2h18.61l-3.5 7 3.5 7H5v6H3V2zm2 12h13.38l-2.5-5 2.5-5H5v10z"/></svg>

          <div class="flex items-center">
            <!-- char countdown + add post -->
            <div id="countWrap" class="hidden items-center gap-3">
              <svg id="countRing" width="20" height="20" viewBox="0 0 20 20" class="-rotate-90">
                <circle cx="10" cy="10" r="9" fill="none" stroke="#2F3336" stroke-width="2" />
                <circle
                  id="countProgress"
                  cx="10" cy="10" r="9" fill="none"
                  stroke="#7856FF" stroke-width="2" stroke-linecap="round"
                  stroke-dasharray="56.549" stroke-dashoffset="56.549"
                />
              </svg>
              <span id="countText" class="hidden text-sm text-x-dim"></span>
              <div class="h-7 w-px bg-x-line"></div>
              <button
                id="addBtn"
                type="button"
                aria-label="Add post"
                class="flex h-7 w-7 items-center justify-center rounded-full border border-[#536471] text-x-accent transition hover:bg-x-accent/10"
              >
                <svg viewBox="0 0 24 24" class="h-4 w-4 fill-current"><path d="M11 11V4h2v7h7v2h-7v7h-2v-7H4v-2h7z" /></svg>
              </button>
            </div>

            <button
              id="postBtn"
              type="button"
              disabled
              class="ml-3 rounded-full bg-x-btn px-5 py-1.5 text-sm font-bold text-x-ink/60 transition disabled:cursor-not-allowed enabled:bg-[#eff3f4] enabled:text-[#0f1419] enabled:hover:bg-[#d7dbdc]"
            >
              Post
            </button>
          </div>

  <button
    id="resetBtn"
    type="button"
    class="mt-4 rounded-full border border-x-line px-4 py-1.5 text-sm font-bold text-x-dim transition hover:bg-white/5 hover:text-x-ink"
  >
    Reset state
  </button>

  <script>
    const editor = document.getElementById("editor");
    const postBtn = document.getElementById("postBtn");
    const audienceBtn = document.getElementById("audienceBtn");
    const replyBtn = document.getElementById("replyBtn");
    const resetBtn = document.getElementById("resetBtn");
    const divider = document.getElementById("divider");
    const toolbar = document.getElementById("toolbar");
    const replyMenu = document.getElementById("replyMenu");
    const replyOptions = document.getElementById("replyOptions");
    const replyLabel = document.getElementById("replyLabel");
    const countWrap = document.getElementById("countWrap");
    const countProgress = document.getElementById("countProgress");
    const countText = document.getElementById("countText");

    const LIMIT = 280;
    const CIRC = 56.549; // 2πr, r=9

    const updateCount = () => {
      const len = [...editor.value].length;
      if (len === 0) {
        countWrap.classList.remove("flex");
        countWrap.classList.add("hidden");
        postBtn.disabled = true;
        return;
      }
      countWrap.classList.remove("hidden");
      countWrap.classList.add("flex");

      const remaining = LIMIT - len;
      countProgress.style.strokeDashoffset = CIRC * (1 - Math.min(len / LIMIT, 1));
      const color = remaining < 0 ? "#f4212e" : remaining <= 20 ? "#ffd400" : "#7856FF";
      countProgress.setAttribute("stroke", color);

      if (remaining <= 20) {
        countText.classList.remove("hidden");
        countText.textContent = remaining;
        countText.style.color = remaining < 0 ? "#f4212e" : "#71767b";
      } else {
        countText.classList.add("hidden");
      }

      postBtn.disabled = remaining < 0;
    };

    // who-can-reply menu
    const stroke = (d) =>
      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-6 w-6">${d}</svg>`;

    const replyChoices = [
      { value: "everyone", label: "Everyone", icon: `<circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/>` },
      { value: "follow", label: "Accounts you follow", icon: `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M16 11l2 2 4-4"/>` },
      { value: "network", label: "Accounts you follow and who they follow", icon: `<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>` },
      { value: "mention", label: "Only accounts you mention", icon: `<circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/>` },
      { value: "verified", label: "Verified accounts", icon: `<path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/>` },
      { value: "regions", label: "Regions", icon: `<path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0 1 16 0Z"/><circle cx="12" cy="10" r="3"/>`, nav: true },
    ];

    let selected = "everyone";

    const radio = (on) =>
      on
        ? `<span class="flex h-6 w-6 items-center justify-center rounded-full bg-x-accent">${stroke(`<path d="m5 12 4 4 10-10"/>`).replace('h-6 w-6', 'h-4 w-4 text-white')}</span>`
        : `<span class="h-6 w-6 rounded-full border-2 border-x-dim"></span>`;

    const chevron = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5 text-x-dim"><path d="m9 18 6-6-6-6"/></svg>`;

    const renderReplyOptions = () => {
      replyOptions.innerHTML = replyChoices
        .map(
          (c) => `
        <button type="button" data-value="${c.value}" class="flex w-full items-center gap-4 px-4 py-3 text-left transition hover:bg-white/5">
          <span class="shrink-0 text-x-ink">${stroke(c.icon)}</span>
          <span class="flex-1 text-[15px] font-bold leading-tight text-x-ink">${c.label}</span>
          ${c.nav ? chevron : radio(c.value === selected)}
        </button>`
        )
        .join("");
    };
    renderReplyOptions();

    const closeReplyMenu = () => replyMenu.classList.add("hidden");

    replyBtn.addEventListener("click", (e) => {
      e.stopPropagation();
      replyMenu.classList.toggle("hidden");
    });

    replyOptions.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-value]");
      if (!btn) return;
      const value = btn.dataset.value;
      const choice = replyChoices.find((c) => c.value === value);
      if (choice.nav) return; // Regions submenu — no-op
      selected = value;
      replyLabel.textContent = `${choice.label} can reply`;
      renderReplyOptions();
      closeReplyMenu();
    });

    document.addEventListener("click", (e) => {
      if (!replyMenu.classList.contains("hidden") && !replyMenu.contains(e.target) && e.target !== replyBtn) {
        closeReplyMenu();
      }
    });

    const reveal = () => {
      audienceBtn.classList.replace("hidden", "inline-flex");
      replyBtn.classList.replace("hidden", "inline-flex");
      divider.classList.remove("hidden");
      toolbar.classList.remove("hidden");
    };

    const hide = () => {
      audienceBtn.classList.replace("inline-flex", "hidden");
      replyBtn.classList.replace("inline-flex", "hidden");
      divider.classList.add("hidden");
      toolbar.classList.add("hidden");
    };

    editor.addEventListener("focus", reveal);

    const autoGrow = () => {
      editor.style.height = "auto";
      editor.style.height = editor.scrollHeight + "px";
    };

    editor.addEventListener("input", () => {
      autoGrow();
      updateCount();
    });

    postBtn.addEventListener("click", () => {
      if (postBtn.disabled) return;
      editor.value = "";
      autoGrow();
      updateCount();
    });

    resetBtn.addEventListener("click", () => {
      editor.value = "";
      editor.blur();
      autoGrow();
      updateCount();
      hide();
      selected = "everyone";
      replyLabel.textContent = "Everyone can reply";
      renderReplyOptions();
      closeReplyMenu();
    });
  </script>
</body>
</html>
