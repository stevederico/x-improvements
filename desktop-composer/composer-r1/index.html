  <script>
    const editor = document.getElementById("editor");
    const postBtn = document.getElementById("postBtn");
    const resetBtn = document.getElementById("resetBtn");
    const divider = document.getElementById("divider");
    const toolbar = document.getElementById("toolbar");
    const audienceIcon = document.getElementById("audienceIcon");
    const combinedPopup = document.getElementById("combinedPopup");
    const audienceOptions = document.getElementById("audienceOptions");
    const replyOptions = document.getElementById("replyOptions");
    const countWrap = document.getElementById("countWrap");
    const countProgress = document.getElementById("countProgress");
    const countText = document.getElementById("countText");

    const LIMIT = 280;
    const CIRC = 81.681; // 2πr, r=13

    function getCaretPosition(element) {
      const selection = window.getSelection();
      if (!selection.rangeCount) return 0;
      const range = selection.getRangeAt(0);
      const preCaretRange = range.cloneRange();
      preCaretRange.selectNodeContents(element);
      preCaretRange.setEnd(range.endContainer, range.endOffset);
      return preCaretRange.toString().length;
    }

    function setCaretPosition(element, position) {
      const selection = window.getSelection();
      const range = document.createRange();
      let charIndex = 0;
      const nodeStack = [element];
      let node;
      let found = false;

      while (nodeStack.length > 0 && !found) {
        node = nodeStack.pop();
        if (node.nodeType === Node.TEXT_NODE) {
          const nextCharIndex = charIndex + node.length;
          if (position >= charIndex && position <= nextCharIndex) {
            range.setStart(node, position - charIndex);
            range.collapse(true);
            found = true;
            break;
          }
          charIndex = nextCharIndex;
        } else {
          let i = node.childNodes.length;
          while (i--) nodeStack.push(node.childNodes[i]);
        }
      }

      if (found) {
        selection.removeAllRanges();
        selection.addRange(range);
      }
    }

    function highlightMentions(el, savedPos = null) {
      const pos = savedPos !== null ? savedPos : getCaretPosition(el);

      let text = el.innerText || '';
      // Escape for safety
      text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
      // Explicitly turn newlines into <br> to avoid weird extra line breaks on paste
      text = text.replace(/\n/g, '<br>');
      const highlighted = text.replace(/@(\w+)/g, '<span class="text-x-accent hover:underline cursor-pointer mention" data-handle="$1">@$1</span>');

      if (el.innerHTML !== highlighted) {
        el.innerHTML = highlighted;
        setCaretPosition(el, pos);
      }
    }

    const updateCount = () => {
      let text = editor.innerText || '';

      // Force truly empty DOM so CSS :empty placeholder shows again after clears.
      // contenteditable leaves <br>/text nodes; :empty only works on zero children.
      if (text.trim().length === 0) {
        if (editor.innerHTML !== '') {
          editor.innerHTML = '';
        }
        text = '';
      }

      const len = [...text].length;
      const remaining = LIMIT - len;

      const isEmpty = len === 0;
      const isOver = remaining < 0;

      if (isEmpty) {
        countWrap.classList.remove("flex");
        countWrap.classList.add("hidden");
      } else {
        countWrap.classList.remove("hidden");
        countWrap.classList.add("flex");
      }

      countProgress.style.strokeDashoffset = CIRC * (1 - Math.min(len / LIMIT, 1));
      countProgress.setAttribute("stroke", "#71767b");

      if (remaining <= 20) {
        countText.classList.remove("hidden");
        countText.textContent = remaining;
        countText.style.color = "#71767b";
      } else {
        countText.classList.add("hidden");
      }

      postBtn.disabled = isEmpty || isOver;
    };

    // combined audience + reply popup (single icon trigger)
    const stroke = (d) =>
      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">${d}</svg>`;

    const audienceChoices = [
      { value: "everyone", label: "Everyone", icon: `<circle cx="12" cy="12" r="10"/><path d="M3 12h18"/><path d="M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/>` },
      { value: "followers", label: "Followers only", icon: `<path d="M12 1.75C6.34 1.75 1.75 6.34 1.75 12S6.34 22.25 12 22.25 22.25 17.66 22.25 12 17.66 1.75 12 1.75zm0 5.25a3.75 3.75 0 1 1 0 7.5 3.75 3.75 0 0 1 0-7.5z"/>` },
    ];

    const replyChoices = [
      { value: "everyone", label: "Everyone", icon: `<circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/>` },
      { value: "follow", label: "Accounts you follow", icon: `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M16 11l2 2 4-4"/>` },
      { value: "network", label: "Accounts you follow and who they follow", icon: `<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>` },
      { value: "mention", label: `Only accounts you mention`, icon: `<circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/>` },
      { value: "verified", label: "Verified accounts", icon: `<path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/>` },
    ];

    let selectedAudience = "everyone";
    let selectedReply = "everyone";

    const radio = (on) =>
      on
        ? `<span class="flex h-5 w-5 items-center justify-center rounded-full bg-x-accent">${stroke(`<path d="m5 12 4 4 10-10"/>`).replace('h-5 w-5', 'h-3.5 w-3.5 text-white')}</span>`
        : `<span class="h-5 w-5 rounded-full border-2 border-x-dim"></span>`;

    const renderAudienceOptions = () => {
      audienceOptions.innerHTML = audienceChoices
        .map(
          (c) => `
        <button type="button" data-section="audience" data-value="${c.value}" class="flex w-full items-center gap-3 px-3 py-2 text-left rounded-xl transition hover:bg-white/5">
          <span class="shrink-0 text-x-ink">${stroke(c.icon)}</span>
          <span class="flex-1 text-[13px] font-bold text-x-ink">${c.label}</span>
          ${radio(c.value === selectedAudience)}
        </button>`
        )
        .join("");
    };

    const renderReplyOptions = () => {
      replyOptions.innerHTML = replyChoices
        .map(
          (c) => `
        <button type="button" data-section="reply" data-value="${c.value}" class="flex w-full items-center gap-3 px-3 py-2 text-left rounded-xl transition hover:bg-white/5">
          <span class="shrink-0 text-x-ink">${stroke(c.icon)}</span>
          <span class="flex-1 text-[13px] font-bold text-x-ink">${c.label}</span>
          ${radio(c.value === selectedReply)}
        </button>`
        )
        .join("");
    };

    renderAudienceOptions();
    renderReplyOptions();

    const closePopup = () => combinedPopup.classList.add("hidden");

    audienceIcon.addEventListener("click", (e) => {
      e.stopPropagation();
      combinedPopup.classList.toggle("hidden");
    });

    combinedPopup.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-value]");
      if (!btn) return;
      const section = btn.dataset.section;
      const value = btn.dataset.value;
      if (section === "audience") {
        selectedAudience = value;
        renderAudienceOptions();
      } else {
        selectedReply = value;
        renderReplyOptions();
      }
      closePopup();
    });

    document.addEventListener("click", (e) => {
      if (!combinedPopup.classList.contains("hidden") && !combinedPopup.contains(e.target) && e.target !== audienceIcon) {
        closePopup();
      }
    });

    const reveal = () => {
      divider.classList.remove("hidden");
      toolbar.classList.remove("hidden");
    };

    const hide = () => {
      divider.classList.add("hidden");
      toolbar.classList.add("hidden");
    };

    editor.addEventListener("focus", reveal);

    const autoGrow = () => {
      editor.style.height = "auto";
      editor.style.height = editor.scrollHeight + "px";
    };

    editor.addEventListener("input", () => {
      autoGrow();
      updateCount();               // fast path: always update button/ring first
    });

    // Highlighting (DOM mutation) runs after the browser has settled the input
    editor.addEventListener("input", () => {
      const pos = getCaretPosition(editor);   // capture position *now*
      requestAnimationFrame(() => {
        // Only do the expensive innerHTML replacement if there are @mentions to process.
        // This lets plain Enter/Return create normal new lines without fighting the DOM.
        if (editor.innerText.includes('@')) {
          highlightMentions(editor, pos);
        }
        updateCount();
      });
    });

    // Extra safety for some browsers / IME
    editor.addEventListener("keyup", () => {
      updateCount();
    });

    editor.addEventListener("paste", () => {
      // Re-highlight after paste (paste can bring raw newlines)
      setTimeout(() => {
        highlightMentions(editor);
        autoGrow();
        updateCount();
      }, 0);
    });

    editor.addEventListener("click", (e) => {
      if (e.target.classList.contains("mention")) {
        // Make it clickable - select the mention text
        const range = document.createRange();
        range.selectNodeContents(e.target);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
    });

    postBtn.addEventListener("click", () => {
      if (postBtn.disabled) return;
      editor.innerHTML = "";
      autoGrow();
      updateCount();
    });

    resetBtn.addEventListener("click", () => {
      editor.innerHTML = "";
      editor.blur();
      autoGrow();
      updateCount();
      hide();
      selectedAudience = "everyone";
      selectedReply = "everyone";
      renderAudienceOptions();
      renderReplyOptions();
      closePopup();
    });

    // Initial state sync (button disabled, etc.)
    updateCount();
  </script>
</body>
</html>
