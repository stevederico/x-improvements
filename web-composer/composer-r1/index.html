<!doctype html>
<!-- FROZEN BASELINE CONTROL - 2026-05-26 - everything vendored in assets/ for exact offline re-creation of the control snapshot. No external network dependencies remain. -->
<html lang="en" class="dark">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Compose</title>
  <style>
    @font-face {
      font-family: TwitterChirp;
      src: url(assets/Chirp-Regular.woff2) format('woff2');
      font-weight: 400; font-display: swap;
    }
    @font-face {
      font-family: TwitterChirp;
      src: url(assets/Chirp-Medium.woff2) format('woff2');
      font-weight: 500; font-display: swap;
    }
    @font-face {
      font-family: TwitterChirp;
      src: url(assets/Chirp-Bold.woff2) format('woff2');
      font-weight: 700; font-display: swap;
    }

    #editor:empty:before {
      content: attr(data-placeholder);
      color: #71767b;
      pointer-events: none;
    }

    .icon-btn {
      position: relative;
      transition: background-color 0.1s ease, color 0.1s ease;
    }
    .icon-btn:hover {
      background-color: #202327;
      color: #e7e9ea;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.35);
    }
    .icon-btn:hover svg,
    .icon-btn:hover img,
    .icon-btn:hover span[style*="mask"] {
      transform: scale(1.08);
    }
    .icon-btn::after {
      content: attr(data-tooltip);
      position: absolute;
      top: 100%;
      left: 50%;
      transform: translateX(-50%);
      margin-top: 6px;
      background-color: #181818;
      color: #e7e9ea;
      font-size: 11px;
      line-height: 1;
      padding: 3px 9px;
      border-radius: 9999px;
      white-space: nowrap;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.5);
      z-index: 9999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.15s ease;
      transition-delay: 0s;
    }
    .icon-btn:hover::after {
      opacity: 1;
      transition-delay: 1.5s;
    }

    #composer.is-fullscreen {
      position: fixed !important;
      inset: 0;
      max-width: none;
      z-index: 100;
      display: flex;
      flex-direction: column;
      background: #000;
      border: none;
      padding: 0;
      box-shadow: none;
    }

    #composer.is-fullscreen > .flex.gap-3 {
      flex: 1;
      display: flex;
      flex-direction: row; /* keep same layout as normal */
      gap: 20px;
      padding: 16px 32px 0;
      overflow: hidden;
    }

    #composer.is-fullscreen #editor {
      min-height: 320px;
      font-size: 21px;
      line-height: 1.55;
      padding-bottom: 80px;
      overflow-y: auto;
    }

    /* Hide the internal divider in fullscreen — the toolbar's top border acts as the bottom separator */
    #composer.is-fullscreen #divider {
      display: none;
    }

    #composer.is-fullscreen .flex-1.min-w-0 {
      display: flex;
      flex-direction: column;
    }

    #composer.is-fullscreen #toolbar {
      position: sticky;
      bottom: 0;
      background: #000;
      border-top: 1px solid #2f3336;
      padding: 12px 0;
      margin-top: auto;
      z-index: 20;
    }

    /* In fullscreen the toolbar is at the bottom, so menus should open upward */
    #composer.is-fullscreen #combinedPopup {
      top: auto !important;
      bottom: 100%;
      margin-top: 0;
      margin-bottom: 8px;
    }

    #composer.is-fullscreen #moreMenu {
      top: auto !important;
      bottom: 100%;
      margin-top: 0;
      margin-bottom: 8px;
    }

    #composer.is-fullscreen .fullscreen-topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      background: #000;
      border-bottom: 1px solid #2f3336;
      padding: 10px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 15px;
      font-weight: 600;
    }

    #composer.is-fullscreen .fullscreen-topbar #exitFullscreenBtn {
      font-size: 22px;
      line-height: 1;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
    }
    #composer.is-fullscreen .fullscreen-topbar #exitFullscreenBtn:hover {
      background-color: #202327;
      color: #e7e9ea;
    }

    /* Visual feedback when Disclosure is enabled */
    #composer.sensitive {
      box-shadow: 0 0 0 2px #f4212e33 inset;
    }
  </style>
  <script src="assets/tailwind.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['TwitterChirp', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'Roboto', 'Helvetica', 'Arial', 'sans-serif'],
          },
          colors: {
            x: {
              accent: "#1D9BF0",
              accentHover: "#1A8CD8",
              ink: "#e7e9ea",
              dim: "#71767b",
              line: "#2f3336",
              btn: "#3a3a3c",
            },
          },
        },
      },
    };
  </script>

                  <div class="space-y-0.5">
                    <button type="button" data-action="fullscreen" class="flex w-full items-center gap-3 px-3 py-2 text-left rounded-xl transition hover:bg-white/5">
                      <span class="shrink-0 text-x-ink"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5"><path d="M8 3H5a2 2 0 0 0-2 2v3M21 8V5a2 2 0 0 0-2-2h-3M3 16v3a2 2 0 0 0 2 2h3M16 21h3a2 2 0 0 0 2-2v-3"/></svg></span>

                    <button type="button" data-action="preview" class="flex w-full items-center gap-3 px-3 py-2 text-left rounded-xl transition hover:bg-white/5">
                      <span class="shrink-0 text-x-ink"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/><circle cx="12" cy="12" r="3"/></svg></span>
                      <span class="flex-1 text-[13px] font-bold text-x-ink">Preview</span>

                      <span class="shrink-0 text-x-ink"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/></svg></span>
                      <span class="flex-1 text-[13px] font-bold text-x-ink">Drafts</span>

          <div class="ml-auto flex items-center gap-3">
            <div class="relative">
              <button
                id="audienceIcon"
                type="button"
                aria-label="Audience and reply settings"
                data-tooltip="Audience"
                class="icon-btn relative rounded-full p-2 transition text-x-dim"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true" class="h-5 w-5 fill-current"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
              </button>

              <div
                id="combinedPopup"
                class="absolute right-0 top-full mt-2 z-50 hidden w-[340px] overflow-hidden rounded-2xl bg-black py-2 shadow-[0_0_15px_rgba(255,255,255,0.15)] text-sm"
              >
                <div class="px-4 pt-1 pb-2">
                  <div class="text-[11px] font-bold uppercase tracking-widest text-x-dim mb-1">Audience</div>
                  <div id="audienceOptions" class="space-y-0.5"></div>
                </div>
                <div class="h-px bg-x-line mx-4 my-1"></div>
                <div class="px-4 pt-1 pb-2">
                  <div class="text-[11px] font-bold uppercase tracking-widest text-x-dim mb-1">Who can reply</div>
                  <div id="replyOptions" class="space-y-0.5"></div>
                </div>
              </div>
            </div>

            <button
              id="postBtn"
              type="button"
              disabled
              class="rounded-full bg-x-btn px-5 py-1.5 text-sm font-bold text-x-ink/60 transition disabled:cursor-not-allowed enabled:bg-[#eff3f4] enabled:text-[#0f1419] enabled:hover:bg-[#d7dbdc]"
            >
              Post
            </button>
          </div>
        </div>
        </div>
      </div>

      <!-- Bold/Italic selection popover (inside composer so collapse guards don't fire on it) -->
      <div
        id="formatPopover"
        class="hidden fixed z-[70] bg-[#16181c] text-x-ink rounded-full shadow-[0_4px_12px_rgba(0,0,0,0.6)] border border-white/10 overflow-hidden flex items-center text-sm font-sans"
      >
        <button id="boldBtn" type="button" class="px-3 py-1 hover:bg-white/10 font-bold transition-colors">B</button>
        <div class="w-px h-3.5 bg-white/20"></div>
        <button id="italicBtn" type="button" class="px-3 py-1 hover:bg-white/10 italic transition-colors">I</button>
      </div>
    </div>

    <div id="debugBar" class="fixed bottom-4 left-4 z-50 flex items-center gap-1 rounded-full bg-black/80 px-2 py-0.5 text-[10px] font-bold text-x-dim">
      <button id="resetBtn" class="hover:text-x-ink transition">reset</button>
      <span class="text-x-dim/50">|</span>
      <button id="modeBtn" class="hover:text-x-ink transition font-bold">Free</button>
    </div>
  </div>

  <script>
    const editor = document.getElementById("editor");
    const postBtn = document.getElementById("postBtn");
    const resetBtn = document.getElementById("resetBtn");
    const modeBtn = document.getElementById("modeBtn");
    const divider = document.getElementById("divider");
    const toolbar = document.getElementById("toolbar");
    const audienceIcon = document.getElementById("audienceIcon");
    const combinedPopup = document.getElementById("combinedPopup");
    const audienceOptions = document.getElementById("audienceOptions");
    const replyOptions = document.getElementById("replyOptions");
    const cursorCounter = document.getElementById("cursorCounter");
    const composer = document.getElementById("composer");
    const formatPopover = document.getElementById("formatPopover");
    const boldBtn = document.getElementById("boldBtn");
    const italicBtn = document.getElementById("italicBtn");
    const moreBtn = document.getElementById("moreBtn");
    const moreMenu = document.getElementById("moreMenu");

    const LIMIT = 280;
    let isPremium = false; // false = Free (hard 280), true = Premium (long form)
    let lastInputWasEnter = false;

    const isEditorEmpty = () => ((editor.innerText || '').trim().length === 0);

    // Caret offset in innerText units (newlines included). We can't hand-count nodes,
    // because the browser inserts <div> blocks on Enter whose boundaries also count as
    // newlines in innerText — miss those and the offset drifts, which scrambles text the
    // moment a line break and a highlighted @mention/URL coexist. So drop a throwaway
    // marker at the caret and read its index out of innerText, which resolves both <div>
    // blocks and <br> to "\n" for us.
    const CARET_MARK = ""; // private-use char that never appears in real input
    function getCaretPosition(element) {
      const selection = window.getSelection();
      if (!selection.rangeCount) return 0;
      const range = selection.getRangeAt(0).cloneRange();
      range.collapse(true);
      const marker = document.createTextNode(CARET_MARK);
      range.insertNode(marker);
      const idx = (element.innerText || "").indexOf(CARET_MARK);
      const parent = marker.parentNode;
      parent.removeChild(marker);
      parent.normalize(); // re-join the text node we split
      return idx < 0 ? 0 : idx;
    }

    // Inverse of getCaretPosition: walk the rebuilt DOM in the same units,
    // treating each <br> as one position so the caret lands on the right line.
    function setCaretPosition(element, position) {
      const selection = window.getSelection();
      const range = document.createRange();
      let charIndex = 0;
      let placed = false;
      const walker = document.createTreeWalker(element, NodeFilter.SHOW_ALL, null);
      let node = walker.nextNode();

      while (node) {
        if (node.nodeType === Node.TEXT_NODE) {
          const next = charIndex + node.length;
          if (position <= next) {
            range.setStart(node, position - charIndex);
            range.collapse(true);
            placed = true;
            break;
          }
          charIndex = next;
        } else if (node.nodeName === "BR") {
          charIndex += 1;
          if (position === charIndex) {
            range.setStartAfter(node);
            range.collapse(true);
            placed = true;
            break;
          }
        }
        node = walker.nextNode();
      }

      if (!placed) {
        range.selectNodeContents(element);
        range.collapse(false);
      }
      selection.removeAllRanges();
      selection.addRange(range);
    }

    function highlightInteractiveText(el, savedPos = null) {
      const pos = savedPos !== null ? savedPos : getCaretPosition(el);

      let text = el.innerText || '';
      // Escape for safety
      text = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

      // Replace usernames (@mentions) and URLs with clickable spans
      const highlighted = text.replace(
        /(@\w+)|(https?:\/\/[^\s]+|www\.[^\s]+)/gi,
        (match, mention, url) => {
          if (mention) {
            return `<span class="text-x-accent cursor-pointer mention" data-handle="${mention.slice(1)}">${mention}</span>`;
          }
          if (url) {
            return `<span class="text-x-accent cursor-pointer link" data-url="${url}">${url}</span>`;
          }
          return match;
        }
      ).replace(/\n/g, '<br>');

      if (el.innerHTML !== highlighted) {
        el.innerHTML = highlighted;
        setCaretPosition(el, pos);
      }
    }

    const updateCount = () => {
      let text = editor.innerText || '';

      // Force truly empty DOM so CSS :empty placeholder shows again after clears.
      // contenteditable leaves <br>/text nodes; :empty only works on zero children.
      if (text.trim().length === 0) {
        if (editor.innerHTML !== '') {
          editor.innerHTML = '';
        }
        text = '';
      }

      const len = [...text].length;
      const remaining = LIMIT - len;

      const isEmpty = len === 0;
      const isOver = remaining < 0;

      // Hard stop for free users (cannot exceed 280)
      postBtn.disabled = isEmpty || (!isPremium && isOver);
    };

    function updateCursorCounter() {
      if (!cursorCounter) return;

      if (isPremium) {
        cursorCounter.classList.add("hidden");
        return;
      }

      const text = editor.innerText || "";
      const len = [...text].length;
      const remaining = LIMIT - len;

      if (len === 0 || remaining > 10) {
        cursorCounter.classList.add("hidden");
        return;
      }

      // In fullscreen, anchor the counter to the bottom horizontal line (above toolbar)
      if (composer.classList.contains('is-fullscreen')) {
        cursorCounter.style.position = 'fixed';
        cursorCounter.style.right = '32px';
        cursorCounter.style.bottom = '68px';   // sits just above the toolbar's top border line
        cursorCounter.style.top = 'auto';
        cursorCounter.style.left = 'auto';
        cursorCounter.style.zIndex = '50';
      } else {
        // Normal mode: caret-adjacent (brutalist)
        cursorCounter.style.position = 'absolute';
        cursorCounter.style.right = "0";
        cursorCounter.style.bottom = "-9px";
        cursorCounter.style.left = "auto";
        cursorCounter.style.top = "auto";
        cursorCounter.style.zIndex = "50";
      }

      cursorCounter.textContent = remaining;
      cursorCounter.style.backgroundColor = "transparent";
      cursorCounter.style.border = "none";
      cursorCounter.style.color = "#fff";
      cursorCounter.style.fontSize = "11px";
      cursorCounter.style.padding = "0";
      cursorCounter.style.borderRadius = "0";
      cursorCounter.style.boxShadow = "none";
      cursorCounter.classList.remove("hidden");
    }

    // combined audience + reply popup (single icon trigger)
    const stroke = (d) =>
      `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="h-5 w-5">${d}</svg>`;

    const audienceChoices = [
      { value: "everyone", label: "Everyone", icon: `<circle cx="12" cy="12" r="10"/><path d="M3 12h18"/><path d="M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/>` },
      { value: "followers", label: "Followers only", icon: `<path d="M12 1.75C6.34 1.75 1.75 6.34 1.75 12S6.34 22.25 12 22.25 22.25 17.66 22.25 12 17.66 1.75 12 1.75zm0 5.25a3.75 3.75 0 1 1 0 7.5 3.75 3.75 0 0 1 0-7.5z"/>` },
    ];

    const replyChoices = [
      { value: "everyone", label: "Everyone", icon: `<circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.5 2.6 2.5 15.4 0 18M12 3c-2.5 2.6-2.5 15.4 0 18"/>` },
      { value: "follow", label: "Accounts you follow", icon: `<path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M16 11l2 2 4-4"/>` },
      { value: "network", label: "Accounts you follow and who they follow", icon: `<path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>` },
      { value: "mention", label: `Only accounts you mention`, icon: `<circle cx="12" cy="12" r="4"/><path d="M16 8v5a3 3 0 0 0 6 0v-1a10 10 0 1 0-3.92 7.94"/>` },
      { value: "verified", label: "Verified accounts", icon: `<path d="M3.85 8.62a4 4 0 0 1 4.78-4.77 4 4 0 0 1 6.74 0 4 4 0 0 1 4.78 4.78 4 4 0 0 1 0 6.74 4 4 0 0 1-4.77 4.78 4 4 0 0 1-6.75 0 4 4 0 0 1-4.78-4.77 4 4 0 0 1 0-6.76Z"/><path d="m9 12 2 2 4-4"/>` },
    ];

    let selectedAudience = "everyone";
    let selectedReply = "everyone";

    const radio = (on) =>
      on
        ? `<span class="flex h-5 w-5 items-center justify-center rounded-full bg-x-accent">${stroke(`<path d="m5 12 4 4 10-10"/>`).replace('h-5 w-5', 'h-3.5 w-3.5 text-white')}</span>`
        : `<span class="h-5 w-5 rounded-full border-2 border-x-dim"></span>`;

    const renderAudienceOptions = () => {
      audienceOptions.innerHTML = audienceChoices
        .map(
          (c) => `
        <button type="button" data-section="audience" data-value="${c.value}" class="flex w-full items-center gap-3 px-3 py-2 text-left rounded-xl transition hover:bg-white/5">
          <span class="shrink-0 text-x-ink">${stroke(c.icon)}</span>
          <span class="flex-1 text-[13px] font-bold text-x-ink">${c.label}</span>
          ${radio(c.value === selectedAudience)}
        </button>`
        )
        .join("");
    };

    const renderReplyOptions = () => {
      replyOptions.innerHTML = replyChoices
        .map(
          (c) => `
        <button type="button" data-section="reply" data-value="${c.value}" class="flex w-full items-center gap-3 px-3 py-2 text-left rounded-xl transition hover:bg-white/5">
          <span class="shrink-0 text-x-ink">${stroke(c.icon)}</span>
          <span class="flex-1 text-[13px] font-bold text-x-ink">${c.label}</span>
          ${radio(c.value === selectedReply)}
        </button>`
        )
        .join("");
    };

    renderAudienceOptions();
    renderReplyOptions();

    const closePopup = () => combinedPopup.classList.add("hidden");

    audienceIcon.addEventListener("click", (e) => {
      e.stopPropagation();
      closeMoreMenu(); // close the other menu if open
      combinedPopup.classList.toggle("hidden");
    });

    combinedPopup.addEventListener("click", (e) => {
      const btn = e.target.closest("button[data-value]");
      if (!btn) return;
      const section = btn.dataset.section;
      const value = btn.dataset.value;
      if (section === "audience") {
        selectedAudience = value;
        renderAudienceOptions();
      } else {
        selectedReply = value;
        renderReplyOptions();
      }
      closePopup();
    });

    // more menu (3 dots dropdown like audience)
    const closeMoreMenu = () => moreMenu && moreMenu.classList.add("hidden");

    let fullscreenTopbar = null;

    function toggleFullscreen() {
      const entering = !composer.classList.contains("is-fullscreen");
      composer.classList.toggle("is-fullscreen");

      if (entering) {
        // Create a minimal top bar for better fullscreen feel
        if (!fullscreenTopbar) {
          fullscreenTopbar = document.createElement("div");
          fullscreenTopbar.className = "fullscreen-topbar";
          fullscreenTopbar.innerHTML = `
            <span>Compose</span>
            <button id="exitFullscreenBtn" aria-label="Exit fullscreen" class="text-x-dim hover:text-x-ink text-2xl leading-none px-2">×</button>
          `;
          composer.prepend(fullscreenTopbar);

          fullscreenTopbar.querySelector("#exitFullscreenBtn").addEventListener("click", () => {
            composer.classList.remove("is-fullscreen");
            if (fullscreenTopbar) {
              fullscreenTopbar.remove();
              fullscreenTopbar = null;
            }
          });
        }

        // In fullscreen, the toolbar should always be visible (even before focusing)
        divider.classList.remove("hidden");
        toolbar.classList.remove("hidden");

        // Focus the editor after layout settles
        setTimeout(() => {
          editor.focus();
          // Place caret at end if there's content
          const range = document.createRange();
          range.selectNodeContents(editor);
          range.collapse(false);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        }, 80);
      } else {
        // Exiting fullscreen
        if (fullscreenTopbar) {
          fullscreenTopbar.remove();
          fullscreenTopbar = null;
        }
        // Restore normal toolbar visibility behavior
        if (isEditorEmpty()) {
          hide();
        }
      }
    }

    // Reliable global Escape handler for fullscreen
    document.addEventListener("keydown", (e) => {
      if (e.key === "Escape" && composer.classList.contains("is-fullscreen")) {
        composer.classList.remove("is-fullscreen");
        if (fullscreenTopbar) {
          fullscreenTopbar.remove();
          fullscreenTopbar = null;
        }
      }
    });

    if (moreBtn && moreMenu) {
      moreBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        closePopup(); // close the other menu if open
        moreMenu.classList.toggle("hidden");
      });

      moreMenu.addEventListener("click", (e) => {
        const btn = e.target.closest("button[data-action]");
        if (!btn) return;
        const action = btn.dataset.action;
        closeMoreMenu();

        if (action === "thread") {
          editor.focus();
        } else if (action === "fullscreen") {
          toggleFullscreen();
        } else if (action === "preview") {
          const orig = composer.style.boxShadow;
          composer.style.boxShadow = "0 0 0 3px #1D9BF0";
          setTimeout(() => { composer.style.boxShadow = orig || ""; }, 650);
        } else if (action === "disclosure") {
          composer.classList.toggle('sensitive');
        }
        // drafts: no-op for now
      });
    }

    document.addEventListener("click", (e) => {
      if (!combinedPopup.classList.contains("hidden") && !combinedPopup.contains(e.target) && e.target !== audienceIcon) {
        closePopup();
      }
      if (moreMenu && !moreMenu.classList.contains("hidden") && !moreMenu.contains(e.target) && e.target !== moreBtn) {
        closeMoreMenu();
      }
      if (!composer.contains(e.target) && document.activeElement !== editor) {
        if (isEditorEmpty()) {
          // In fullscreen, keep the toolbar visible at all times
          if (!composer.classList.contains('is-fullscreen')) {
            hide();
          }
          hideFormatPopover();
        }
      }
      // Hide format popover if clicking outside editor + popover — but NOT while a
      // selection is still active. Ending a drag-select outside the editor (in the card
      // padding/toolbar) fires a click on the card; hiding here would kill the popover on
      // the very gesture that made the selection. Real dismiss clicks collapse the
      // selection (and/or blur the editor), which hide it via the other handlers.
      if (formatPopover && !formatPopover.contains(e.target) && !editor.contains(e.target)) {
        const sel = window.getSelection();
        if (!sel || sel.isCollapsed) hideFormatPopover();
      }
    });

    const reveal = () => {
      divider.classList.remove("hidden");
      toolbar.classList.remove("hidden");
    };

    const hide = () => {
      divider.classList.add("hidden");
      toolbar.classList.add("hidden");
      hideFormatPopover();
    };

    const hideFormatPopover = () => {
      if (!formatPopover) return;
      formatPopover.classList.add("hidden");
      formatPopover.style.opacity = "0";
    };

    const selectionIsOnlyClickable = (range) => {
      if (!range || range.collapsed) return false;
      // Walk the LIVE DOM (not cloneContents — a single-text-node selection clones
      // to a bare text node with no parent span, losing the .mention/.link context).
      const walker = document.createTreeWalker(editor, NodeFilter.SHOW_TEXT, null);
      let node;
      let sawClickable = false;
      while ((node = walker.nextNode())) {
        if (!range.intersectsNode(node)) continue;
        // Only inspect the portion of this text node inside the selection.
        let start = 0;
        let end = node.textContent.length;
        if (node === range.startContainer) start = range.startOffset;
        if (node === range.endContainer) end = range.endOffset;
        const text = node.textContent.slice(start, end).trim();
        if (text) {
          const parent = node.parentElement;
          // Treat both @usernames and URLs as non-formatable "clickable" text
          if (!parent || !parent.closest('.mention, .link')) return false;
          sawClickable = true;
        }
      }
      return sawClickable;
    };

    const showFormatPopover = () => {
      if (!formatPopover || !editor) return;
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed || !sel.rangeCount) {
        hideFormatPopover();
        return;
      }
      const range = sel.getRangeAt(0);
      if (!editor.contains(range.commonAncestorContainer)) {
        hideFormatPopover();
        return;
      }
      if (selectionIsOnlyClickable(range)) {
        hideFormatPopover();
        return;
      }
      const rect = range.getBoundingClientRect();
      formatPopover.classList.remove("hidden");
      formatPopover.style.opacity = "0";
      requestAnimationFrame(() => {
        const pw = formatPopover.offsetWidth || 68;
        const left = rect.left + rect.width / 2 - pw / 2;
        const top = rect.bottom + 6;
        formatPopover.style.left = `${Math.max(8, left)}px`;
        formatPopover.style.top = `${top}px`;
        formatPopover.style.opacity = "1";
      });
    };

    const updateFormatPopover = () => {
      if (document.activeElement === editor) {
        showFormatPopover();
      } else {
        hideFormatPopover();
      }
    };

    editor.addEventListener("focus", reveal);

    editor.addEventListener("blur", (e) => {
      if (cursorCounter) cursorCounter.classList.add("hidden");
      hideFormatPopover();
      const next = e.relatedTarget;
      if (next && composer.contains(next)) return;
      if (isEditorEmpty()) {
        // In fullscreen, keep the toolbar visible at all times
        if (!composer.classList.contains('is-fullscreen')) {
          hide();
        }
        closePopup();
      }
    });

    // Let the browser handle Enter natively (it inserts a clean <br>); just flag it
    // so the highlight rebuild skips one input cycle and doesn't fight the new line.
    editor.addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        lastInputWasEnter = true;
      }
    });

    const autoGrow = () => {
      editor.style.height = "auto";
      editor.style.height = editor.scrollHeight + "px";
    };

    editor.addEventListener("input", () => {
      // Hard limit enforcement for free users — skip right after Enter so newline can settle
      if (!isPremium && !lastInputWasEnter) {
        let currentLen = [...editor.innerText].length;
        if (currentLen > LIMIT) {
          const truncated = [...editor.innerText].slice(0, LIMIT).join("");
          editor.innerText = truncated;

          const range = document.createRange();
          range.selectNodeContents(editor);
          range.collapse(false);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        }
      }

      autoGrow();
      updateCount();
      updateCursorCounter();
    });

    // Highlighting (DOM mutation) runs after the browser has settled the input.
    editor.addEventListener("input", () => {
      requestAnimationFrame(() => {
        if (lastInputWasEnter) {
          lastInputWasEnter = false;
          updateCount();
          updateCursorCounter();
          return;
        }

        // Process @mentions and URLs into clickable elements.
        // Skip if formatting (bold/italic) is present so we don't destroy the wrappers.
        // Only here do we measure the caret — getCaretPosition drops a temporary marker
        // into the DOM, so calling it on every keystroke (not just when rebuilding) can
        // disturb in-flight typing and duplicate characters.
        const hasInteractive = /@|https?:\/\/|www\./i.test(editor.innerText);
        if (hasInteractive &&
            !/<(b|i|strong|em)\b/i.test(editor.innerHTML)) {
          highlightInteractiveText(editor);
        }
        updateCount();
        updateCursorCounter();
      });
    });

    // Extra safety for some browsers / IME
    editor.addEventListener("keyup", () => {
      updateCount();
      updateCursorCounter();
    });

    editor.addEventListener("paste", () => {
      // Re-highlight after paste (paste can bring raw newlines)
      setTimeout(() => {
        if (!/<(b|i|strong|em)\b/i.test(editor.innerHTML)) {
          highlightInteractiveText(editor);
        }
        autoGrow();
        updateCount();
        updateCursorCounter();
      }, 0);
    });

    editor.addEventListener("click", (e) => {
      const clickable = e.target.closest('.mention, .link');
      if (clickable) {
        const range = document.createRange();
        range.selectNodeContents(clickable);
        const sel = window.getSelection();
        sel.removeAllRanges();
        sel.addRange(range);
      }
      updateCursorCounter();
    });

    editor.addEventListener("mouseup", () => {
      setTimeout(updateFormatPopover, 0);
    });

    document.addEventListener("selectionchange", () => {
      if (document.activeElement === editor) {
        updateCursorCounter();
        updateFormatPopover();
      } else {
        hideFormatPopover();
      }
    });

    postBtn.addEventListener("click", () => {
      if (postBtn.disabled) return;
      editor.innerHTML = "";
      autoGrow();
      updateCount();
    });

    function updateModeUI() {
      modeBtn.textContent = isPremium ? "Premium" : "Free";
      modeBtn.classList.toggle("text-x-accent", isPremium);
      updateCount();
      updateCursorCounter();
    }

    resetBtn.addEventListener("click", () => {
      editor.innerHTML = "";
      editor.blur();
      autoGrow();
      updateCount();
      hide();
      selectedAudience = "everyone";
      selectedReply = "everyone";
      renderAudienceOptions();
      renderReplyOptions();
      closePopup();
      if (cursorCounter) cursorCounter.classList.add("hidden");
    });

    modeBtn.addEventListener("click", () => {
      isPremium = !isPremium;
      updateModeUI();
    });

    // Bold / Italic formatting popover buttons
    if (boldBtn && italicBtn) {
      const preventHide = (e) => e.preventDefault();
      boldBtn.addEventListener("mousedown", preventHide);
      italicBtn.addEventListener("mousedown", preventHide);

      boldBtn.addEventListener("click", () => {
        document.execCommand("bold", false, null);
        hideFormatPopover();
        updateCount();
        updateCursorCounter();
      });

      italicBtn.addEventListener("click", () => {
        document.execCommand("italic", false, null);
        hideFormatPopover();
        updateCount();
        updateCursorCounter();
      });
    }

    // Initialize mode UI
    updateModeUI();

    // Initial state sync (button disabled, etc.)
    updateCount();
    updateCursorCounter();
  </script>
</body>
</html>
